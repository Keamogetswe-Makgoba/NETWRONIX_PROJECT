{% extends 'base.html' %}

{% block content %}
<div class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-900 p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-white">GRADE {{ grade }} ASSESSMENT</h1>
            <span class="bg-blue-800 px-3 py-1 rounded text-sm">Physics Portal</span>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-6 max-w-3xl">
        <form method="POST" action="{% url 'submit_quiz' %}">
            {% csrf_token %}
            
            {% for q in questions %}
            <div class="mb-6 p-6 bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="flex items-start mb-4">
                    <span class="bg-blue-100 text-blue-800 font-bold px-3 py-1 rounded-lg mr-3">
                        {{ forloop.counter }}
                    </span>
                    <p class="text-gray-800 font-medium text-lg pt-1">{{ q.text }}</p>
                </div>

                <div class="grid grid-cols-1 gap-3 ml-11">
                    <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-blue-50 transition border-gray-100">
                        <input type="radio" name="question_{{ q.id }}" value="A" class="w-4 h-4 text-blue-600" required>
                        <span class="ml-3 text-gray-700">A) {{ q.option_a }}</span>
                    </label>

                    <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-blue-50 transition border-gray-100">
                        <input type="radio" name="question_{{ q.id }}" value="B" class="w-4 h-4 text-blue-600">
                        <span class="ml-3 text-gray-700">B) {{ q.option_b }}</span>
                    </label>

                    <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-blue-50 transition border-gray-100">
                        <input type="radio" name="question_{{ q.id }}" value="C" class="w-4 h-4 text-blue-600">
                        <span class="ml-3 text-gray-700">C) {{ q.option_c }}</span>
                    </label>

                    <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-blue-50 transition border-gray-100">
                        <input type="radio" name="question_{{ q.id }}" value="D" class="w-4 h-4 text-blue-600">
                        <span class="ml-3 text-gray-700">D) {{ q.option_d }}</span>
                    </label>
                </div>
            </div>
            {% empty %}
            <div class="text-center py-20 bg-white rounded-xl shadow-sm">
                <p class="text-gray-500">No questions available for Grade {{ grade }} yet.</p>
            </div>
            {% endfor %}

            {% if questions %}
            <div class="mt-10 flex justify-center">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-12 rounded-full shadow-lg transform transition hover:scale-105">
                    SUBMIT MY ANSWERS
                </button>
            </div>
            {% endif %}
        </form>
    </main>
</div>
{% endblock %}
