{% extends "base.html" %} {% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-6">
  <div
    class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden border-t-8 border-yellow-400"
  >
    <div class="bg-custom-blue p-8 text-center">
      <div class="inline-block p-4 bg-blue-800 rounded-full mb-4 shadow-inner">
        <span class="text-4xl">🎥</span>
      </div>
      <h2 class="text-3xl font-bold text-white">Netwronix Live</h2>
      <p class="text-blue-200 text-sm mt-1 uppercase tracking-widest">
        Broadcast Physics Session
      </p>
    </div>

    <div class="p-8">
      <form method="POST" class="space-y-6">
        {% csrf_token %}

        <div>
          <label
            class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1"
            >Session Topic</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
            >
              📝
            </span>
            <input
              type="text"
              name="title"
              class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-900 focus:border-transparent outline-none transition"
              placeholder="e.g. Newton's 2nd Law Review"
              required
            />
          </div>
        </div>

        <div>
          <label
            class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1"
            >Target Grade</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"
            >
              🎓
            </span>
            <select
              name="grade"
              class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-900 focus:border-transparent outline-none transition appearance-none"
            >
              <option value="11">Grade 11 (Physics)</option>
              <option value="12" selected>Grade 12 (Physics)</option>
            </select>
          </div>
        </div>

        <div class="pt-4 space-y-4 text-center">
          <button
            type="submit"
            class="w-full bg-custom-blue text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-800 transform hover:-translate-y-1 transition shadow-lg active:scale-95"
          >
            Launch Classroom
          </button>

          <a
            href="{% url 'teacher_dashboard' %}"
            class="inline-block text-sm font-semibold text-gray-400 hover:text-blue-900 transition"
          >
            ← Back to Control Center
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  /* Ensure the custom colors from your dashboard are available here */
  .bg-custom-blue {
    background-color: #1e3a8a;
  }
  /* Simple hover effect for the select dropdown arrow */
  select {
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
    background-position: right 0.5rem center;
    background-repeat: no-repeat;
    background-size: 1.5em 1.5em;
  }
</style>
{% endblock %}
