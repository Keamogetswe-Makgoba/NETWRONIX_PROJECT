{% extends 'base.html' %} {% block content %}
<script src="https://meet.jit.si/external_api.js"></script>

<div class="bg-gray-900 min-h-screen p-4 font-sans">
  <div class="max-w-6xl mx-auto">
    <div
      class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 text-white space-y-4 md:space-y-0"
    >
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight text-white">
          {{ live_class.title }}
        </h1>
        <div class="flex items-center space-x-3 mt-1">
          <span
            class="bg-blue-600 text-[10px] px-2 py-0.5 rounded-full font-black uppercase tracking-widest animate-pulse"
          >
            Live Now
          </span>
          <p class="text-gray-400 font-medium text-sm">
            Physics | Grade {{ live_class.grade }}
          </p>
        </div>
      </div>

      {% if user.role == 'teacher' %}
      <a
        href="{% url 'end_live_class' class_id=live_class.id %}"
        class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg flex items-center group"
      >
        <span class="mr-2">🛑</span> End Class
      </a>
      {% else %}
      <a
        href="{% url 'dashboard_student' %}"
        class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg flex items-center group"
      >
        <span class="mr-2">🚪</span> Leave Class
      </a>
      {% endif %}
    </div>

    <div class="relative group">
      <div
        id="video-container"
        class="w-full bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-800"
        style="height: 75vh; min-height: 550px"
      ></div>

      <div
        class="absolute bottom-4 left-4 pointer-events-none opacity-40 group-hover:opacity-100 transition-opacity"
      >
        <p
          class="text-white text-xs font-bold bg-black/60 px-3 py-1.5 rounded-lg backdrop-blur-md border border-white/10"
        >
          Netwronix Secure Learning Portal
        </p>
      </div>
    </div>
  </div>
</div>

<script>
  const domain = "meet.jit.si";

  const userRole = "{{ request.user.role }}".toLowerCase();
  const isTeacher = userRole === "teacher";

  const options = {
    roomName: "Netwronix_{{ room_name }}",
    width: "100%",
    height: "100%",
    parentNode: document.querySelector("#video-container"),
    userInfo: {
      displayName: "{{ user_name }}",
    },
    configOverwrite: {
      prejoinPageEnabled: false,
      prejoinConfig: { enabled: false },
      enableWelcomePage: false,
      startWithAudioMuted: !isTeacher,
      disableThirdPartyRequests: true,
    },
    interfaceConfigOverwrite: {
      TOOLBAR_BUTTONS: [
        "microphone",
        "camera",
        "closedcaptions",
        "desktop",
        "fullscreen",
        "fodeviceselection",
        "hangup",
        "profile",
        "chat",
        "recording",
        "raisehand",
        "videoquality",
        "filmstrip",
        "tileview",
        "mute-everyone",
        "security",
      ],
      SHOW_JITSI_WATERMARK: false,
      SHOW_BRAND_WATERMARK: false,
    },
  };

  const api = new JitsiMeetExternalAPI(domain, options);

  api.addEventListener("videoConferenceLeft", () => {
    console.log("Leaving class. User Role detected as:", userRole);

    if (isTeacher) {
      window.location.href = "{% url 'end_live_class' meeting_id=room_name %}";
    } else {
      window.location.href = "{% url 'dashboard_student' %}";
    }
  });
</script>
{% endblock %}
