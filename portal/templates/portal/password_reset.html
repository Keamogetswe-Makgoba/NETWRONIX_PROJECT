{% extends 'base.html' %} {% block content %}
<div class="container mx-auto mt-10 p-6 bg-white shadow-md rounded-lg max-w-md">
  <h2 class="text-2xl font-bold mb-4 text-blue-800">Reset Your Password</h2>

  <p class="text-gray-600 mb-6 text-sm">
    Enter your registered email address below. We will send you a secure link to
    create a new password.
  </p>

  <form method="post" class="space-y-4">
    {% csrf_token %}

    <div>
      <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1"
        >Email Address</label
      >
      <input
        type="email"
        name="email"
        id="id_email"
        required
        autocomplete="email"
        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 shadow-sm"
        placeholder="e.g. student@example.com"
      />
    </div>

    <button
      type="submit"
      class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200"
    >
      Send Reset Link
    </button>
  </form>

  <div class="mt-6 pt-4 border-t border-gray-100 text-center">
    <a
      href="{% url 'selection' %}"
      class="text-sm text-blue-600 hover:underline"
    >
      Back to Selection
    </a>
  </div>
</div>
{% endblock %}
