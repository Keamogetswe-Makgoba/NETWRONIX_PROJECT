<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Netwronix | Student Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-blue-900 min-h-screen flex items-center justify-center px-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-900">Student Access</h1>
        <p class="text-gray-500">Log in to view your Physics work</p>
      </div>

      <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2"
            >Email Address</label
          >
          <input
            type="email"
            name="email"
            required
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-yellow-400 focus:outline-none"
          />
        </div>
        <div class="mb-6">
          <label class="block text-gray-700 font-bold mb-2">Password</label>
          <input
            type="password"
            name="password"
            required
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-yellow-400 focus:outline-none"
          />
        </div>

        {% if error %}
        <div
          class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mb-4 text-sm"
        >
          {{ error }}
        </div>
        {% endif %}

        <button
          type="submit"
          class="w-full bg-yellow-400 text-blue-900 font-bold py-3 rounded-lg hover:bg-yellow-500 transition shadow-lg"
        >
          LOGIN
        </button>

        <a
          href="{% url 'password_reset' %}"
          class="text-sm text-blue-600 hover:underline"
        >
          Forgot Password?
        </a>
      </form>

      <div class="mt-6 text-center space-y-2">
        <p class="text-xs text-gray-500">
          Not registered?
          <a href="/portal-selection/" class="text-blue-600 hover:underline"
            >Sign up here</a
          >
        </p>
        <a href="/" class="block text-sm text-gray-400 hover:underline"
          >← Back to Home</a
        >
      </div>
    </div>
  </body>
</html>
