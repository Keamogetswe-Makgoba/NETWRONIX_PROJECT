<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netwronix | Teacher Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div
      class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border-t-8 border-blue-900"
    >
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-900">Teacher Portal</h1>
        <p class="text-gray-500">Please sign in to manage your classes</p>
      </div>

      <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
          <label class="block text-gray-700 font-bold mb-2"
            >Email Address</label
          >
          <input
            type="email"
            name="email"
            required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-yellow-500"
          />
        </div>
        <div class="mb-6">
          <label class="block text-gray-700 font-bold mb-2">Password</label>
          <input
            type="password"
            name="password"
            required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-yellow-500"
          />
        </div>

        {% if error %}
        <p class="text-red-500 text-sm mb-4">{{ error }}</p>
        {% endif %}

        <button
          type="submit"
          class="w-full bg-blue-900 text-yellow-400 font-bold py-3 rounded-lg hover:bg-blue-800 transition"
        >
          LOGIN
        </button>

        <a
          href="{% url 'password_reset' %}"
          class="text-sm text-blue-600 hover:underline"
        >
          Forgot Password?
        </a>
      </form>

      <div class="mt-6 text-center">
        <a
          href="/portal-selection/"
          class="text-sm text-gray-600 hover:underline"
          >← Back to Selection</a
        >
      </div>
    </div>
  </body>
</html>
