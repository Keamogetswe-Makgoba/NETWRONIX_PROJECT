<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netwronix | Select Your Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-custom-blue { background-color: #1e3a8a; }
        .text-custom-yellow { color: #facc15; }
        .bg-custom-yellow { background-color: #facc15; }
        .hover-yellow:hover { background-color: #eab308; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <nav class="bg-custom-blue p-4 shadow-md">
        <div class="container mx-auto">
            <h1 class="text-2xl font-bold text-custom-yellow">NETWRONIX PORTAL</h1>
        </div>
    </nav>

    <main class="flex-grow container mx-auto flex flex-col items-center justify-center px-4 py-12">
        <h2 class="text-3xl font-bold text-custom-blue mb-10">Choose your path to success</h2>

        <div class="grid md:grid-cols-3 gap-8 w-full max-w-5xl">
            <a href="/login/teacher/" class="group bg-white p-8 rounded-2xl shadow-xl border-b-8 border-custom-blue text-center transition-transform transform hover:-translate-y-2">
                <div class="text-5xl mb-4">👨‍🏫</div>
                <h3 class="text-2xl font-bold text-custom-blue mb-2">Teacher Portal</h3>
                <p class="text-gray-500 mb-6">Manage classes, verify students, and upload work.</p>
                <span class="inline-block bg-custom-blue text-white px-6 py-2 rounded-full font-semibold group-hover:bg-blue-700">Enter</span>
            </a>

            <a href="/register/grade11/" class="group bg-white p-8 rounded-2xl shadow-xl border-b-8 border-custom-yellow text-center transition-transform transform hover:-translate-y-2">
                <div class="text-5xl mb-4">📚</div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">Grade 11</h3>
                <p class="text-gray-500 mb-6">Physics: Vectors, Newton's Laws, and Electrostatics.</p>
                <span class="inline-block bg-custom-yellow text-custom-blue px-6 py-2 rounded-full font-semibold hover-yellow">Select</span>
            </a>

            <a href="/register/grade12/" class="group bg-white p-8 rounded-2xl shadow-xl border-b-8 border-custom-yellow text-center transition-transform transform hover:-translate-y-2">
                <div class="text-5xl mb-4">🎓</div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">Grade 12</h3>
                <p class="text-gray-500 mb-6">Physics: Projectile Motion, Momentum, and Chemistry.</p>
                <span class="inline-block bg-custom-yellow text-custom-blue px-6 py-2 rounded-full font-semibold hover-yellow">Select</span>
            </a>
        </div>

        <a href="/" class="mt-12 text-custom-blue font-medium hover:underline">← Back to Home</a>
    </main>

</body>
</html>
