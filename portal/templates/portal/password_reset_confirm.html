<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netwronix | Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .bg-custom-blue {
        background-color: #1e3a8a;
      }
      .bg-custom-yellow {
        background-color: #facc15;
      }

      /* Styling the Django form inputs globally */
      form p {
        margin-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        color: #374151; /* gray-700 */
        font-weight: 600;
        font-size: 0.875rem;
      }
      input {
        padding: 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid #d1d5db;
        background-color: #f9fafb;
        font-weight: 400;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: #1e3a8a;
        ring: 2px;
        ring-color: #1e3a8a;
      }
      .helptext {
        font-size: 0.75rem;
        color: #6b7280;
        font-weight: 400;
        margin-top: 0.25rem;
      }
      .errorlist {
        color: #dc2626;
        font-size: 0.875rem;
        list-style: none;
        padding: 0;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex flex-col">
    <nav
      class="bg-custom-blue p-4 text-white flex justify-between items-center shadow-lg"
    >
      <h1
        class="text-2xl font-bold text-custom-yellow uppercase tracking-tighter"
      >
        Netwronix Security
      </h1>
      <a
        href="javascript:history.back()"
        class="text-sm font-medium hover:text-custom-yellow transition"
      >
        ← Back to Dashboard
      </a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
      <div
        class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border-t-8 border-custom-blue"
      >
        <div class="p-8">
          <div class="text-center mb-8">
            <div class="text-5xl mb-4">🔐</div>
            <h2
              class="text-2xl font-black text-blue-900 uppercase tracking-tight"
            >
              Update Password
            </h2>
            <p class="text-gray-500 text-sm mt-2">
              Ensure your account remains secure.
            </p>
          </div>

          <form method="post" class="space-y-4">
            {% csrf_token %} {{ form.as_p }}

            <button
              type="submit"
              class="w-full bg-custom-blue text-white font-bold py-3 rounded-xl shadow-md hover:bg-blue-800 transition transform hover:-translate-y-1 active:scale-95 uppercase tracking-wider mt-6"
            >
              Confirm New Password
            </button>
          </form>

          <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-400 italic">
              Logged in as:
              <span class="font-bold text-gray-600">{{ user.username }}</span>
            </p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
